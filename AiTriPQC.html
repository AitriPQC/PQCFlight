<body class="bg-gray-100 font-sans">
  <!-- Password Form -->
  <div id="password-form">
    <form id="password-input-form">
      <h2 class="text-2xl font-bold mb-4 text-gray-800">Nhập mật khẩu để truy cập</h2>
      <input type="password" id="password-input" placeholder="Mật khẩu" required />
      <button type="submit">Xác nhận</button>
      <div id="error-msg"></div>
      <p class="footer-text">Written by Mr Ái Trì - 0903 049955</p>
    </form>
  </div>

  <!-- Dashboard Content -->
  <div id="dashboard">
    <div id="root" class="container mx-auto p-4"></div>
  </div>

  <script>
    // Password protection logic
    const correctPassword = '123@456';
    const form = document.getElementById('password-input-form');
    const input = document.getElementById('password-input');
    const errorMsg = document.getElementById('error-msg');
    const dashboard = document.getElementById('dashboard');
    const passwordForm = document.getElementById('password-form');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const enteredPass = input.value.trim();
      if (enteredPass === correctPassword) {
        passwordForm.style.display = 'none';
        dashboard.style.display = 'block';
        // Delay render để script Babel load xong (tăng lên 1s để fix TypeError)
        setTimeout(() => {
          if (window.App && window.ReactDOM && window.ReactDOM.createRoot) {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(window.App));
          } else {
            console.error('App or React chưa load. Reload trang.');
            document.getElementById('root').innerHTML = '<div class="text-center text-red-500">Lỗi load dashboard. Reload trang và thử lại.</div>';
          }
        }, 1000);
      } else {
        errorMsg.textContent = 'Mật khẩu không đúng! Vui lòng thử lại.';
        input.value = '';
        input.focus();
      }
    });

    // Auto-focus input sau khi DOM ready
    window.addEventListener('load', () => { input.focus(); });
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { PieChart, Pie, Tooltip, Legend, Cell, ResponsiveContainer, LineChart, Line, Area, XAxis, YAxis, CartesianGrid, Label } = Recharts;

    const COLORS = ['#0088FE', '#00C49F', '#FFBB28', '#FF8042', '#A28EFF', '#FF4D4F', '#4CAF50', '#FF6F61', '#6B7280', '#AB47BC', '#F97316', '#10B981'];

    const parseDate = (dateStr) => {
      return new Date(dateStr);
    };

    const parseTimeToFraction = (timeStr) => {
      if (!timeStr || timeStr === 'Không xác định') return 0;
      const [hours, minutes] = timeStr.split(':').map(Number);
      return (hours + minutes / 60) / 24;
    };

    const fractionToTime = (fraction) => {
      if (isNaN(fraction)) return 'Không xác định';
      const hours = Math.floor(fraction * 24);
      const minutes = Math.round((fraction * 24 - hours) * 60);
      return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
    };

    const normalizeCityName = (city) => {
      if (city === 'Danang') return 'Da Nang';
      return city.trim();
    };

    const cleanCountryName = (countryStr) => {
      if (!countryStr) return 'Không xác định';
      const parts = countryStr.split('|');
      if (parts.length > 1) {
        return parts[1].trim();
      }
      return countryStr.trim();
    };

    const processAndCleanData = (data) => {
      return data
        .filter(row => row['STT'] && row['Ngày'] && row['Thành phố'] && row['Quốc gia'])
        .map(row => ({
          stt: parseInt(row['STT']) || 0,
          date: parseDate(row['Ngày']),
          airline: row['Hãng bay'] ? row['Hãng bay'].trim() : 'Không xác định',
          city: normalizeCityName(row['Thành phố'] || 'Không xác định'),
          country: cleanCountryName(row['Quốc gia']),
          time: fractionToTime(parseTimeToFraction(row['TIME'])),
          isCharter: row['Charter'] === 'X', // Thêm cột Charter, giả định "X" là charter
          flightNo: row['Flight No'] ? row['Flight No'].trim().replace(/^"|"$/g, '') : 'N/A',
          isDomestic: row['Domestic'] === 'X',
          isInternational: row['International'] === 'X'
        }));
    };

    const aggregateData = (data, groupBy, startDate = null, endDate = null) => {
      const counts = {};
      data.forEach(row => {
        const rowDate = row.date;
        if (startDate && endDate) {
          if (rowDate < startDate || rowDate > endDate) return;
        }
        const key = row[groupBy];
        counts[key] = (counts[key] || 0) + 1;
      });

      const sorted = Object.entries(counts)
        .sort((a, b) => b[1] - a[1]);
      return sorted.map(([name, value], index) => ({ name, value, stt: index + 1 }));
    };

    const aggregateDomesticInternational = (data, startDate = null, endDate = null) => {
      let domestic = 0, international = 0;
      data.forEach(row => {
        const rowDate = row.date;
        if (startDate && endDate) {
          if (rowDate < startDate || rowDate > endDate) return;
        }
        if (row.isDomestic) domestic++;
        if (row.isInternational) international++;
      });
      return [
        { name: 'Nội địa', value: domestic, stt: 1 },
        { name: 'Quốc tế', value: international, stt: 2 }
      ].filter(item => item.value > 0);
    };

    const getTopInternationalCityAndCountry = (data, startDate = null, endDate = null) => {
      const cityCounts = {};
      const countryCounts = {};
      const cityToCountry = {};

      data.forEach(row => {
        const rowDate = row.date;
        if (startDate && endDate) {
          if (rowDate < startDate || rowDate > endDate) return;
        }
        if (row.isInternational) {
          const city = row.city;
          const country = row.country;
          cityCounts[city] = (cityCounts[city] || 0) + 1;
          countryCounts[country] = (countryCounts[country] || 0) + 1;
          cityToCountry[city] = country;
        }
      });

      const topCountryEntry = Object.entries(countryCounts).sort((a, b) => b[1] - a[1])[0];
      const topCities = Object.entries(cityCounts)
        .filter(([city]) => cityToCountry[city] === topCountryEntry?.[0])
        .sort((a, b) => b[1] - a[1])
        .map(([name, count]) => ({ name, count }));

      const topCityEntry = Object.entries(cityCounts).sort((a, b) => b[1] - a[1])[0];
      const topCity = topCityEntry ? { name: topCityEntry[0], count: topCityEntry[1], country: cityToCountry[topCityEntry[0]] } : null;

      return {
        topCity,
        topCountry: topCountryEntry ? { name: topCountryEntry[0], count: topCountryEntry[1], cities: topCities } : null
      };
    };

    const aggregateCharterCountries = (data, startDate = null, endDate = null) => {
      const results = [];
      const uniqueCountries = new Set();
      data.forEach(row => {
        const rowDate = row.date;
        if (startDate && endDate) {
          if (rowDate < startDate || rowDate > endDate) return;
        }
        if (row.isCharter) {
          uniqueCountries.add(row.country);
        }
      });

      Array.from(uniqueCountries).forEach((countryName, index) => {
        const filtered = data.filter(row => row.country === countryName && row.isCharter && row.date >= (startDate || new Date(0)) && row.date <= (endDate || new Date()));
        const total = filtered.length;
        if (total > 0) {
          results.push({
            name: countryName,
            value: total,
            stt: index + 1
          });
        }
      });
      results.sort((a, b) => b.value - a.value);
      results.forEach((item, index) => { item.stt = index + 1; });
      return results;
    };

    const aggregateFlightsByDate = (data, startDate, endDate) => {

      const domesticCounts = {};
      const internationalCounts = {};
      data.forEach(row => {
        const rowDate = row.date.toISOString().split('T')[0];

          if (row.isDomestic) domesticCounts[rowDate] = (domesticCounts[rowDate] || 0) + 1;
          if (row.isInternational) internationalCounts[rowDate] = (internationalCounts[rowDate] || 0) + 1;
        }
      });
      return Object.keys(counts).map(date => ({
        date: date,
        totalFlights: counts[date],
        domesticFlights: domesticCounts[date] || 0,
        internationalFlights: internationalCounts[date] || 0
      }));
    };

      const formatNumber = (num) => {

      const getTrendMeta = (currentAvg, previousAvg, tolerancePct = 0.03) => {
        const base = previousAvg || currentAvg || 0;
        const delta = currentAvg - previousAvg;
        const pct = base === 0 ? 0 : delta / base;
        if (pct > tolerancePct) return { key: 'up', arrow: '▲', text: 'đang tăng', className: 'up' };
        if (pct < -tolerancePct) return { key: 'down', arrow: '▼', text: 'đang giảm', className: 'down' };

      };

      const getSeriesTrendFromFlights = (rows, key) => {
        const last7 = rows.slice(-7);

        const avg = arr => arr.length ? arr.reduce((s, it) => s + (it[key] || 0), 0) / arr.length : 0;
        const currentAvg = avg(last7);
        const previousAvg = prev7.length ? avg(prev7) : currentAvg;
        return {
          currentAvg,
          previousAvg,
          ...getTrendMeta(currentAvg, previousAvg)
        };

      const renderInfographic = () => {

        const intlPct = totalDomesticIntl > 0 ? Math.round((internationalValue / totalDomesticIntl) * 100) : 0;
        const charterPct = totalFlights > 0 ? Math.round((charterValue / totalFlights) * 100) : 0;

          <div className="kpi-strip-wrap">

              borderRadius: '14px',
              padding: '12px 14px',
              boxShadow: '0 8px 28px rgba(0,0,0,0.18)',
              color: '#fff',
              minWidth: '180px'
            }}>
              <div style={{ fontWeight: 700, marginBottom: '8px', color: '#e2e8f0' }}>
                {label}
              </div>
              {payload.map((entry, idx) => (
                <div key={idx} style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  gap: '14px',
                  fontSize: '13px',
                  marginBottom: '4px'
                }}>
                  <span style={{ color: entry.color }}>{entry.name}</span>
                  <strong>{entry.value}</strong>
                </div>
              ))}
            </div>
          );
        };

        return (
          <div className="chart-premium-card">
            <h3 className="chart-premium-title">{title}</h3>
                        {(() => {
              const totalTrend = getSeriesTrendFromFlights(enrichedData, 'totalFlights');
              const domesticTrend = getSeriesTrendFromFlights(enrichedData, 'domesticFlights');
              const intlTrend = getSeriesTrendFromFlights(enrichedData, 'internationalFlights');

              return (
                <>
                  <div className="chart-signal-row">
                    <span className={`chart-signal-pill chart-signal-${totalTrend.className}`}>Tổng chuyến {totalTrend.arrow} {totalTrend.text}</span>
                    <span className={`chart-signal-pill chart-signal-${domesticTrend.className}`}>Nội địa {domesticTrend.arrow} {domesticTrend.text}</span>
                    <span className={`chart-signal-pill chart-signal-${intlTrend.className}`}>Quốc tế {intlTrend.arrow} {intlTrend.text}</span>
                  </div>

                  <div className="chart-ma7-note">
                    MA7 hiện tại ≈ {Math.round(totalTrend.currentAvg)} chuyến/ngày; 7 ngày trước ≈ {Math.round(totalTrend.previousAvg)} chuyến/ngày
                  </div>
                </>
              );
            })()}
            <ResponsiveContainer width="100%" height={400}>
              <LineChart data={enrichedData} margin={{ top: 10, right: 20, left: 0, bottom: 10 }}>
                <defs>
                  <linearGradient id="totalFlightsFill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="#4f46e5" stopOpacity={0.20} />
                    <stop offset="100%" stopColor="#4f46e5" stopOpacity={0.02} />
                  </linearGradient>
                </defs>

                <CartesianGrid strokeDasharray="4 4" stroke="rgba(148,163,184,0.22)" />
                <XAxis dataKey="date" tick={{ fill: '#64748b', fontSize: 12 }} tickLine={false} axisLine={{ stroke: 'rgba(148,163,184,0.25)' }} minTickGap={24} />
                <YAxis tick={{ fill: '#64748b', fontSize: 12 }} tickLine={false} axisLine={false} width={44} />
                <Tooltip content={<CustomTooltip />} />
                <Legend wrapperStyle={{ paddingTop: '10px', fontSize: '13px' }} />

                <Area type="monotone" dataKey="totalFlights" stroke="none" fill="url(#totalFlightsFill)" name="" legendType="none" />
                <Line
                  type="monotone"
                  dataKey="totalFlights"
                  stroke="#4f46e5"
                  name="Tổng số chuyến"
                  strokeWidth={3}
                  dot={false}
                  activeDot={{ r: 5, strokeWidth: 0, fill: '#4f46e5' }}
                  label={(props) => {
                    const { x, y, value, index } = props;
                    const dataLength = enrichedData.length;

                    if (index < dataLength - 14) return null;

                    const isRecent7 = index >= dataLength - 7;

                    return (
                      <text
                        x={x}
                        y={y - 8}
                        textAnchor="middle"
                        fontSize="9"
                        fontWeight="700"
                        fill={isRecent7 ? "#0f172a" : "#94a3b8"}
                      >
                        {value}
                      </text>
                    );
                  }}
                />
                <Line type="monotone" dataKey="ma7" stroke="#ff6b8a" name="MA7" strokeWidth={2.5} strokeDasharray="6 6" dot={false} activeDot={{ r: 4, strokeWidth: 0, fill: '#ff6b8a' }} />
                                <Line type="monotone" dataKey="domesticFlights" stroke="#10b981" name="Nội địa" strokeWidth={1.8} strokeOpacity={0.95} dot={false} activeDot={{ r: 4, strokeWidth: 0, fill: '#10b981' }} />
                <Line type="monotone" dataKey="internationalFlights" stroke="#f59e0b" name="Quốc tế" strokeWidth={1.8} strokeOpacity={0.95} dot={false} activeDot={{ r: 4, strokeWidth: 0, fill: '#f59e0b' }} />
              </LineChart>
            </ResponsiveContainer>
                      </div>
        );
      };

      if (loading) {
        return <div className="text-center text-xl">{t('loading')}</div>;
      }

      const filteredData = getFilteredData();
      const totalFlights = filteredData.length;
      const numDays = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
      const showAvg = numDays > 1;
      const avgTotal = showAvg ? Math.round(totalFlights / numDays) : '';
      const avgText = language === 'vi' ? 'chuyến/ngày' : 'flights/day';

      if (totalFlights === 0 && noDataMsg) {
        return <div className="no-data-msg">{noDataMsg}</div>;
      }

      const domesticInternational = aggregateDomesticInternational(filteredData, startDate, endDate);
      const byCountry = aggregateData(filteredData.filter(r => r.country !== 'Vietnam'), 'country', startDate, endDate);
      const byAirline = aggregateData(filteredData, 'airline', startDate, endDate);
      const byCity = aggregateData(filteredData, 'city', startDate, endDate);
      const charterCountries = aggregateCharterCountries(filteredData, startDate, endDate);

      const topDomesticData = aggregateData(filteredData.filter(r => r.isDomestic), 'city', startDate, endDate);
      const topIntlCities = aggregateData(filteredData.filter(r => r.isInternational), 'city', startDate, endDate);

      const formatDate = (date) => {
        return `${date.getDate()}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getFullYear()}`;
      };

      const startDateFormatted = formatDate(startDate);
      const endDateFormatted = formatDate(endDate);

      // Format date for input value (local YYYY-MM-DD)
      const formatDateForInput = (date) => {
        const year = date.getFullYear();
        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        const day = date.getDate().toString().padStart(2, '0');
        return `${year}-${month}-${day}`;
      };

      return (
        <div className="space-y-8">
          <h1 className="dashboard-title">{t('title')}</h1>
          <div className="topbar-wrap">
            <div className="topbar-grid">
              <div className="topbar-field compact">
                <label className="topbar-label">{t('fromDate')}</label>
                <input
                  type="date"
                  className="topbar-input"
                  value={formatDateForInput(startDate)}
                  onChange={(e) => setStartDate(new Date(e.target.value))}
                />
              </div>

              <div className="topbar-field compact">
                <label className="topbar-label">{t('toDate')}</label>
                <input
                  type="date"
                  className="topbar-input"
                  value={formatDateForInput(endDate)}
                  onChange={(e) => setEndDate(new Date(e.target.value))}
                />
              </div>

              <div className="topbar-field topbar-url">
                <label className="topbar-label">Google Sheet URL</label>
                <input
                  type="text"
                  className="topbar-input"
                  value={sheetUrl}
                  onChange={handleUrlChange}
                  placeholder={t('urlPlaceholder')}
                />
              </div>

              <button
                className="topbar-btn primary"
                onClick={handleReload}
              >
                {t('reload')}
              </button>

              <button
                className="topbar-btn secondary"
                onClick={() => setLanguage(language === 'vi' ? 'en' : 'vi')}
              >
                {language === 'vi' ? 'Switch to English' : 'Chuyển sang Tiếng Việt'}
              </button>
            </div>
          </div>

          {numDays >= 7 && (
            <div className="hero-chart-section">
              {renderLineChart(aggregateFlightsByDate(filteredData, startDate, endDate), t('timeline', { start: startDateFormatted, end: endDateFormatted }))}
            </div>
          )}

          {renderInfographic()}

          <div className="space-y-6">
            {renderStatsBlock(byCountry, t('pie2'), 'country')}
            {renderStatsBlock(byCity, t('pie4'), 'city')}
            {renderStatsBlock(byAirline, t('pie3'), 'airline')}
            {renderStatsBlock(charterCountries, t('pie5'), 'charter')}
          </div>

          <footer className="text-center text-xs text-gray-500 mt-8 pt-4">
            <strong>Written by Mr Ái Trì @2025. Mobile: 0903 049955</strong>
          </footer>
        </div>
      );
    };

    // Export App to global scope
    window.App = App;
  </script>
</body>
</html>
